
name: CI
on: [push, pull_request]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - run: python --version
      - run: uname -a
      - run: pip install -e '.[dev]'
      - run: python -m pip install --upgrade pip setuptools>=77.0.0 build wheel
      - run: python -m pip check
      - run: pip list
      - run: python -c "import sys; print(sys.path)"
      - run: python -c "import pkg_resources; print(pkg_resources.working_set)"

      - run: pip freeze > requirements_ci_runtime.txt
      - run: ruff check .
      - run: pytest --cov=scaleforge
      - uses: codecov/codecov-action@v4
        continue-on-error: true
      - run: python -m build

      - name: Install PyTorch CPU (Windows only)
        if: runner.os == 'Windows'
        run: |
          pip install torch==2.2.2+cpu torchvision==0.17.2+cpu --index-url https://download.pytorch.org/whl/cpu
          pip install pyinstaller==6.6

      - name: Build CLI EXE (Windows only)
        if: runner.os == 'Windows'
        run: |
          # System configuration
          git config --system core.longpaths true
          
          # Dependencies
          py -m pip install --upgrade pip
          py -m pip install torch==2.2.2+cpu torchvision==0.17.2+cpu --index-url https://download.pytorch.org/whl/cpu
          py -m pip install pyinstaller==6.6
          
          # Build with absolute paths
          $buildPath = Join-Path $pwd "src"
          cd $buildPath
          py -m PyInstaller -n ScaleForge -F -c --paths=. scaleforge\cli\main.py
          
          # Verify artifact exists
          $artifactPath = Join-Path $buildPath "dist\ScaleForge.exe"
          if (!(Test-Path $artifactPath)) {
              Write-Error "Build failed - executable not found at $artifactPath"
              exit 1
          }

      - uses: actions/upload-artifact@v4
        if: runner.os == 'Windows'
        with:
          name: ScaleForge-win-x64
          path: src/dist/ScaleForge.exe
      - uses: actions/upload-artifact@v4
        with:
          name: ci-requirements-${{ matrix.os }}-${{ matrix.python-version }}
          path: requirements_ci_runtime.txt
